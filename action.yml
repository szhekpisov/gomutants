name: gomutants
description: Mutation testing for Go with PR-scoped runs and inline annotations.
branding:
  icon: alert-triangle
  color: yellow

inputs:
  args:
    description: |
      Arguments passed to gomutants (e.g. "--changed-since origin/main ./...").
      The action automatically appends --annotations=github so surviving mutants
      show up as inline annotations on the PR diff.
    required: true
  version:
    description: |
      gomutants version to install. A release tag (e.g. "v0.2.1") or
      "latest" downloads a pre-built binary from the GitHub release and
      verifies its signed build attestation via `gh attestation verify`.
      Any other value (branch, SHA, etc.) falls back to `go install`
      without signature verification.
    required: false
    default: latest
  threshold-efficacy:
    description: |
      Minimum test efficacy % (KILLED/(KILLED+LIVED)). Below threshold
      the step exits with code 10. Default "100" gates on any LIVED
      mutant. Set to "" to disable. gremlins-compat exit code.
    required: false
    default: "100"
  threshold-mcover:
    description: |
      Minimum mutant coverage % ((KILLED+LIVED)/(KILLED+LIVED+NOT_COVERED)).
      Below threshold the step exits with code 11. Default "" disables
      the gate. gremlins-compat exit code.
    required: false
    default: ""
  working-directory:
    description: Directory to run gomutants from. Must contain go.mod.
    required: false
    default: .
  cache:
    description: |
      Path to the incremental-analysis cache file. Default
      ".gomutants-cache.json" (in the working directory) reuses cached
      outcomes between runs for unchanged mutants. Set to "off" to
      disable caching entirely. Pair with actions/cache to persist the
      file across CI runs.
    required: false
    default: .gomutants-cache.json

runs:
  using: composite
  steps:
    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: ${{ inputs.working-directory }}/go.mod

    - name: Fetch base ref (PR events)
      if: github.event_name == 'pull_request'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        BASE_REF: ${{ github.base_ref }}
      run: git fetch --no-tags origin "$BASE_REF"

    - name: Install gomutants
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
        REPO: szhekpisov/gomutants
        GH_TOKEN: ${{ github.token }}
      # For a release tag (or "latest") we download the prebuilt binary
      # and verify its signed build attestation, so the action runs the
      # exact artifact produced by .github/workflows/release.yml. For any
      # other version (branch, SHA) we fall back to `go install` with a
      # warning — no signed binary exists for non-release refs. The
      # smoke-test workflow pre-installs from source and passes
      # version=latest; honor that pre-existing binary.
      run: |
        set -euo pipefail

        if [ "$VERSION" = "latest" ] && command -v gomutants >/dev/null 2>&1; then
          echo "gomutants already on PATH ($(gomutants --version)); skipping install (version: latest)"
          exit 0
        fi

        if [ "$VERSION" = "latest" ]; then
          VERSION=$(gh release view --repo "$REPO" --json tagName --jq .tagName)
          echo "Resolved latest -> $VERSION"
        fi

        if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "::warning::Version '$VERSION' is not a release tag; falling back to 'go install' without signature verification"
          go install "github.com/szhekpisov/gomutants@$VERSION"
          exit 0
        fi

        case "$RUNNER_OS" in
          Linux) os=linux ;;
          macOS) os=darwin ;;
          *) echo "::error::Unsupported runner OS: $RUNNER_OS"; exit 1 ;;
        esac
        case "$RUNNER_ARCH" in
          X64)   arch=amd64 ;;
          ARM64) arch=arm64 ;;
          *) echo "::error::Unsupported runner arch: $RUNNER_ARCH"; exit 1 ;;
        esac

        semver="${VERSION#v}"
        asset="gomutants_${semver}_${os}_${arch}.tar.gz"
        workdir="$(mktemp -d)"

        echo "Downloading $asset from $REPO@$VERSION"
        gh release download "$VERSION" --repo "$REPO" --pattern "$asset" --dir "$workdir"

        # --signer-workflow pins the attestation to release.yml so a
        # different (potentially compromised) workflow in the repo
        # cannot mint a passing attestation for a forged binary.
        echo "Verifying build provenance for $asset"
        gh attestation verify "$workdir/$asset" \
          --repo "$REPO" \
          --signer-workflow "$REPO/.github/workflows/release.yml"

        tar -xzf "$workdir/$asset" -C "$workdir"
        install_dir="$HOME/.local/bin"
        mkdir -p "$install_dir"
        install -m 0755 "$workdir/gomutants" "$install_dir/gomutants"
        echo "$install_dir" >> "$GITHUB_PATH"
        rm -rf "$workdir"

        echo "Installed gomutants $VERSION ($("$install_dir/gomutants" --version))"

    - name: Run gomutants
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        ARGS: ${{ inputs.args }}
        THRESHOLD_EFFICACY: ${{ inputs.threshold-efficacy }}
        THRESHOLD_MCOVER: ${{ inputs.threshold-mcover }}
        CACHE: ${{ inputs.cache }}
      # --annotations=github goes first because Go's flag package stops
      # parsing flags after the first non-flag token (the package list).
      # Empty threshold/cache inputs forward as --cache= (which disables
      # caching) or omit the gate flag entirely. Non-empty values
      # forward to gomutants directly. Default threshold-efficacy=100
      # means a surviving mutant fails the step (gremlins-compat exit
      # code 10). $ARGS is intentionally unquoted so multi-token inputs
      # word-split.
      run: |
        gate=()
        if [ -n "$THRESHOLD_EFFICACY" ]; then
          gate+=("--threshold-efficacy=$THRESHOLD_EFFICACY")
        fi
        if [ -n "$THRESHOLD_MCOVER" ]; then
          gate+=("--threshold-mcover=$THRESHOLD_MCOVER")
        fi
        gomutants --annotations=github "--cache=$CACHE" "${gate[@]}" $ARGS

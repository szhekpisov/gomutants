name: Security & Static Analysis

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main, worktree-init]
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # every Monday at 06:00 UTC

jobs:
  changes:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # paths-filter calls the PR listFiles API; needs read access.
    permissions:
      contents: read
      pull-requests: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - uses: step-security/harden-runner@ec9f2d5744a09debf3a187a3f4f675c53b671911 # v2.13.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            code:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
            workflows:
              - '.github/workflows/**'

  govulncheck:
    needs: changes
    # Gate logic:
    #   - always(): required because `needs: changes` would otherwise
    #     skip this job when changes itself is skipped (non-PR events).
    #   - github.event_name != 'pull_request': force-run on push/schedule.
    #   - needs.changes.outputs.code == 'true': on PRs, only run when
    #     Go sources or go.mod/go.sum changed.
    if: |
      always() &&
      (github.event_name != 'pull_request' || needs.changes.outputs.code == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: step-security/harden-runner@ec9f2d5744a09debf3a187a3f4f675c53b671911 # v2.13.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.1"

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4

      - name: Run govulncheck
        run: govulncheck ./...

  zizmor:
    needs: changes
    if: |
      always() &&
      (github.event_name != 'pull_request' || needs.changes.outputs.workflows == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@ec9f2d5744a09debf3a187a3f4f675c53b671911 # v2.13.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      # Run zizmor directly rather than via zizmor-action: the action
      # uploads SARIF via codeql-action/upload-sarif which needs
      # code-scanning enabled on the repo and an `actions: read` token
      # scope we'd rather not grant. Plain CLI exits non-zero on
      # findings, which is all we need for a PR gate. pipx is
      # preinstalled on ubuntu-latest runners.
      - name: Run zizmor
        run: pipx run zizmor==1.22.0 .github/workflows/

  golangci-lint:
    needs: changes
    if: |
      always() &&
      (github.event_name != 'pull_request' || needs.changes.outputs.code == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: step-security/harden-runner@ec9f2d5744a09debf3a187a3f4f675c53b671911 # v2.13.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.1"

      - uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9
        with:
          # v9 of the action only supports golangci-lint v2+.
          version: v2.1.6
          # The v2.1.6 prebuilt binary was compiled with Go 1.24 and
          # refuses to lint projects targeting a newer Go version.
          # goinstall rebuilds golangci-lint with the toolchain from
          # the setup-go step above (go.mod's 1.26.1), so the linter's
          # Go version matches the target.
          install-mode: goinstall

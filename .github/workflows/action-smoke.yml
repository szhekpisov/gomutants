name: Action smoke test
on:
  pull_request:
  push:
    branches: [main, worktree-init]

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@ec9f2d5744a09debf3a187a3f4f675c53b671911 # v2.13.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      # Build the binary from this PR's source so the action exercises the
      # code under review, not the published `latest`.
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: Install gomutants from source
        run: go install ./...

      - name: Run action against this repo
        uses: ./
        with:
          # --dry-run skips test execution so the smoke job stays fast
          # (<30s) and produces a deterministic report.
          args: --dry-run ./internal/report/...
          fail-on-lived: "false"

name: Action smoke test
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      # Build the binary from this PR's source so the action exercises the
      # code under review, not the published `latest`.
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: Install gomutants from source
        run: go install ./...

      # Wiring sanity: --dry-run finishes in seconds and validates the
      # action's flag plumbing without spawning per-mutant test runs.
      - name: Smoke (dry-run)
        uses: ./
        with:
          args: --dry-run ./internal/report/...
          threshold-efficacy: ""

      # End-to-end: a real run against the smallest internal package so
      # the full pipeline (test execution + --annotations=github +
      # WriteGitHubAnnotations) is exercised in CI. ./internal/patch/...
      # is ~17 lines of source and known mutation-clean, so the step
      # runs in well under a minute. threshold-efficacy is disabled: we
      # assert the action wires up correctly, not that the codebase is
      # mutation-clean.
      - name: Smoke (live run)
        uses: ./
        with:
          args: --only ARITHMETIC_BASE -w 2 ./internal/patch/...
          threshold-efficacy: ""

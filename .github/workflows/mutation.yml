name: Mutation Testing

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:

jobs:
  mutation:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: step-security/harden-runner@ec9f2d5744a09debf3a187a3f4f675c53b671911 # v2.13.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          # --changed-since needs the PR base ref available locally; the
          # action fetches it on PR events, but the rest of the merge-base
          # chain still requires non-shallow history.
          fetch-depth: 0

      # Build gomutants from this PR's source so the action exercises the
      # in-tree mutation engine, not the published `latest`. The action
      # detects an existing binary on PATH and skips its `go install` step
      # when version=latest, which preserves the dogfood property without
      # forking the action itself.
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: Install in-tree gomutants
        run: go install ./...

      # Dogfood the published action (pinned to main) on a --changed-since
      # run scoped to the PR diff. threshold-efficacy defaults to "100" so
      # any LIVED mutant on changed lines exits the step with gremlins-
      # compat code 10. -workers=2 caps memory pressure on GitHub-hosted
      # runners (NumCPU × parallel `go test` overlays trips the host's
      # OOM killer otherwise).
      - uses: szhekpisov/gomutants@main
        with:
          args: -workers=2 -verbose --changed-since "origin/${{ github.base_ref }}" ./...

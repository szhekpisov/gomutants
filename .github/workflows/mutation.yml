name: Mutation Testing

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
  push:
    branches: [main]

jobs:
  mutation:
    runs-on: ubuntu-latest
    # Full-tree post-merge runs need more headroom than --changed-since
    # PR runs: main's mutants exercise integration tests that fork
    # subprocesses, so each takes minutes. 60 covers ./... at -workers=2
    # on a GitHub-hosted Linux runner.
    timeout-minutes: 60
    steps:
      - uses: step-security/harden-runner@ec9f2d5744a09debf3a187a3f4f675c53b671911 # v2.13.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          # --changed-since needs the PR base ref available locally; the
          # action fetches it on PR events, but the rest of the merge-base
          # chain still requires non-shallow history.
          fetch-depth: 0

      # Build gomutants from this PR's source so the action exercises the
      # in-tree mutation engine, not the published `latest`. The action
      # detects an existing binary on PATH and skips its `go install` step
      # when version=latest, which preserves the dogfood property without
      # forking the action itself.
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: Install in-tree gomutants
        run: go install ./...

      # PR run: scope to the diff. threshold-efficacy=100 (action default)
      # exits 10 on any LIVED mutant on changed lines.
      - name: Run mutation testing (PR, changed-since)
        if: github.event_name == 'pull_request'
        uses: szhekpisov/gomutants@15315f9b020ec723e5f4495224e48712bcb939c1 # main
        with:
          # No quotes around the ref: $ARGS in the action is unquoted so
          # it word-splits, and a literal `"` would land in the
          # --changed-since value (`fatal: ambiguous argument '"origin/main"'`).
          args: -workers=2 -verbose --changed-since origin/${{ github.base_ref }} ./...

      # Post-merge run: full ./... covers code no PR happened to touch.
      # Same threshold-efficacy=100 gate. --stryker-output writes the
      # dashboard report consumed by the upload step below.
      - name: Run mutation testing (full tree, post-merge)
        if: github.event_name == 'push'
        uses: szhekpisov/gomutants@15315f9b020ec723e5f4495224e48712bcb939c1 # main
        with:
          args: -workers=2 -verbose --stryker-output stryker-report.json ./...

      # Push the Stryker-format report to the public dashboard so the
      # mutation-score badge in the README reflects the latest main. Only
      # runs on push to main: the dashboard keys reports by branch/SHA,
      # and PR-branch uploads from --changed-since runs are partial.
      # `if: always()` is intentionally NOT used — a failed mutation run
      # should not push a misleading score.
      - name: Upload to Stryker Dashboard
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          STRYKER_DASHBOARD_KEY: ${{ secrets.STRYKER_DASHBOARD_KEY }}
        run: |
          curl -fSs -X PUT \
            -H "X-Api-Key: $STRYKER_DASHBOARD_KEY" \
            -H "Content-Type: application/json" \
            --data @stryker-report.json \
            "https://dashboard.stryker-mutator.io/api/reports/github.com/szhekpisov/gomutants/main"

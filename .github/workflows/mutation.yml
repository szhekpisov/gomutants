name: Mutation Testing

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: step-security/harden-runner@ec9f2d5744a09debf3a187a3f4f675c53b671911 # v2.13.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            code:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'

  mutation:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: step-security/harden-runner@ec9f2d5744a09debf3a187a3f4f675c53b671911 # v2.13.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.1"

      # Dogfood: mutation-test gomutant with the in-tree gomutant build,
      # so any regression in the mutation engine is caught by the same
      # gate that protects the test suite.
      - name: Build gomutant
        run: go build -o gomutant .

      # The runner sends SIGTERM to the step's process group partway through
      # the run (cause unidentified — possibly memory pressure from 2 parallel
      # `go test` workers compiling 600+ mutated overlays). gomutant's signal
      # handler catches it cleanly: workers stop, partial results are written
      # to the report, and gomutant exits 0. But bash (non-interactive) queues
      # the same SIGTERM and dies with 143 the moment its foreground command
      # returns — failing the step even though the report is valid.
      #
      # `trap '' TERM` makes bash ignore SIGTERM. gomutant still receives it
      # per-process and shuts down gracefully; bash stays alive long enough
      # to run the threshold check below.
      #
      # -verbose so each completed mutant is logged, useful for debugging.
      - name: Run mutation testing
        run: |
          trap '' TERM
          ./gomutant -verbose -o mutation-report.json ./internal/...

      - name: Check efficacy threshold
        # Pinned to the local measurement on internal/ at PR time:
        # 88.03% (522 killed, 71 lived, 53 not_viable, 9 timed_out,
        # 26 not_covered). Threshold = current floor; any regression
        # fails the gate. Bump alongside test improvements.
        run: |
          set -euo pipefail
          EFFICACY=$(jq '.test_efficacy' mutation-report.json)
          THRESHOLD=88.03
          echo "Test efficacy: ${EFFICACY}% (required: ${THRESHOLD}%)"
          if [ "$(echo "${EFFICACY} < ${THRESHOLD}" | bc -l)" -eq 1 ]; then
            echo "::error::Mutation test efficacy ${EFFICACY}% is below ${THRESHOLD}% threshold"
            exit 1
          fi

      - name: Clean build cache
        if: always()
        run: go clean -cache

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mutation-report
          path: mutation-report.json
          retention-days: 30

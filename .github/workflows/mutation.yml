name: Mutation Testing

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
  push:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: step-security/harden-runner@ec9f2d5744a09debf3a187a3f4f675c53b671911 # v2.13.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            code:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'

  mutation:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: step-security/harden-runner@ec9f2d5744a09debf3a187a3f4f675c53b671911 # v2.13.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          # --changed-since needs the merge-base with the PR base ref
          # available locally; the default shallow clone hides it.
          fetch-depth: 0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.1"

      # Dogfood: mutation-test gomutants with the in-tree gomutants build,
      # so any regression in the mutation engine is caught by the same
      # gate that protects the test suite.
      - name: Build gomutants
        run: go build -o gomutants .

      # GitHub-hosted ubuntu runners are tight on memory: NumCPU parallel
      # `go test` workers each compile ~650 mutated overlays, which is enough
      # to push the runner host into memory pressure. The host's OOM killer
      # then kills the runner agent itself — earlier runs showed the mutation
      # step succeeding while the job ended in failure with all `if: always()`
      # steps skipped (a tell-tale sign of agent-level termination).
      #
      # Pin workers to 2 here even though the binary defaults to NumCPU; this
      # is a CI capacity constraint, not a recommendation for general use.
      #
      # `trap '' TERM` is defense-in-depth: should the runner still send a
      # mid-run SIGTERM, gomutants catches it gracefully (writes the partial
      # report, exits 0) but bash would otherwise queue the signal and die
      # with 143 the instant gomutants returns. Trapping in bash keeps the
      # script alive long enough to run the post-run gate step.
      #
      # Two modes:
      #  - PRs: --changed-since limits work to touched lines (~10× faster);
      #    gate on "no LIVED mutant in the diff".
      #  - Push to main: full-tree run; gate on the absolute test_efficacy
      #    floor calibrated against history (catches coverage rot in code
      #    no PR happens to touch).
      - name: Run mutation testing (PR, changed-since)
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          trap '' TERM
          ./gomutants -workers=2 -verbose --changed-since "origin/${BASE_REF}" -o mutation-report.json ./internal/...

      - name: Run mutation testing (full tree, post-merge)
        if: github.event_name == 'push'
        run: |
          trap '' TERM
          ./gomutants -workers=2 -verbose -o mutation-report.json ./internal/...

      # On --changed-since runs the absolute test_efficacy floor is no
      # longer meaningful (subset varies per PR). Gate instead on "no
      # LIVED mutant on changed lines": every mutation introduced by the
      # PR must be killed by some test.
      - name: Gate on lived mutants (PR)
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          if [ ! -s mutation-report.json ]; then
            echo "::error::mutation-report.json missing or empty"
            exit 1
          fi
          # `// 0` defaults each missing field to 0 so a partial report
          # produces a meaningful gate decision rather than failing
          # opaquely on `[ null -gt 0 ]`. jq itself errors on malformed
          # JSON, which `set -e` then propagates.
          TOTAL=$(jq -r '.mutants_total // 0' mutation-report.json)
          KILLED=$(jq -r '.mutants_killed // 0' mutation-report.json)
          LIVED=$(jq -r '.mutants_lived // 0' mutation-report.json)
          NOT_VIABLE=$(jq -r '.mutants_not_viable // 0' mutation-report.json)
          NOT_COVERED=$(jq -r '.mutants_not_covered // 0' mutation-report.json)
          # TIMED_OUT isn't a top-level field; derive as residual.
          TIMED_OUT=$(( TOTAL - KILLED - LIVED - NOT_VIABLE - NOT_COVERED ))
          echo "Mutants on changed lines: total=${TOTAL} killed=${KILLED} lived=${LIVED} not_viable=${NOT_VIABLE} not_covered=${NOT_COVERED} timed_out=${TIMED_OUT}"
          if [ "${LIVED}" -gt 0 ]; then
            echo "::error::${LIVED} mutant(s) on changed lines survived — strengthen tests or revert"
            exit 1
          fi

      # Pinned to the local measurement on internal/ at PR time:
      # 88.03% (522 killed, 71 lived, 53 not_viable, 9 timed_out,
      # 26 not_covered). Threshold = current floor; any regression
      # fails the gate. Bump alongside test improvements.
      - name: Check efficacy threshold (post-merge)
        if: github.event_name == 'push'
        run: |
          set -euo pipefail
          if [ ! -s mutation-report.json ]; then
            echo "::error::mutation-report.json missing or empty"
            exit 1
          fi
          EFFICACY=$(jq -r '.test_efficacy // empty' mutation-report.json)
          if [ -z "${EFFICACY}" ]; then
            echo "::error::test_efficacy missing from mutation-report.json"
            exit 1
          fi
          THRESHOLD=88.03
          echo "Test efficacy: ${EFFICACY}% (required: ${THRESHOLD}%)"
          if [ "$(echo "${EFFICACY} < ${THRESHOLD}" | bc -l)" -eq 1 ]; then
            echo "::error::Mutation test efficacy ${EFFICACY}% is below ${THRESHOLD}% threshold"
            exit 1
          fi

      - name: Clean build cache
        if: always()
        run: go clean -cache

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mutation-report
          path: mutation-report.json
          retention-days: 30

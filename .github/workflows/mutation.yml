name: Mutation Testing

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: step-security/harden-runner@ec9f2d5744a09debf3a187a3f4f675c53b671911 # v2.13.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            code:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'

  mutation:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: step-security/harden-runner@ec9f2d5744a09debf3a187a3f4f675c53b671911 # v2.13.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.1"

      # Dogfood: mutation-test gomutant with the in-tree gomutant build,
      # so any regression in the mutation engine is caught by the same
      # gate that protects the test suite.
      - name: Build gomutant
        run: go build -o gomutant .

      # The written report is the source of truth, not gomutant's exit code:
      # the binary occasionally trails with SIGTERM (exit 143) during cleanup
      # of leaked test subprocesses on CI, after the report has already been
      # written. Threshold = current measured floor on internal/; bump
      # alongside test improvements.
      - name: Run mutation testing & check efficacy
        run: |
          # Disable -e so we can keep going on a non-zero exit and inspect
          # the report file ourselves (see comment above the step).
          set +e
          set -uo pipefail
          ./gomutant -o mutation-report.json ./internal/...
          GOMUTANT_EXIT=$?

          if [ ! -s mutation-report.json ]; then
            echo "::error::mutation-report.json missing or empty (gomutant exit ${GOMUTANT_EXIT})"
            exit 1
          fi
          if [ "${GOMUTANT_EXIT}" -ne 0 ] && [ "${GOMUTANT_EXIT}" -ne 143 ]; then
            echo "::error::gomutant exited ${GOMUTANT_EXIT} (only 0 or 143 tolerated)"
            exit "${GOMUTANT_EXIT}"
          fi

          EFFICACY=$(jq '.test_efficacy' mutation-report.json)
          THRESHOLD=88.03
          echo "Test efficacy: ${EFFICACY}% (required: ${THRESHOLD}%)"
          if [ "$(echo "${EFFICACY} < ${THRESHOLD}" | bc -l)" -eq 1 ]; then
            echo "::error::Mutation test efficacy ${EFFICACY}% is below ${THRESHOLD}% threshold"
            exit 1
          fi

      - name: Clean build cache
        if: always()
        run: go clean -cache

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mutation-report
          path: mutation-report.json
          retention-days: 30
